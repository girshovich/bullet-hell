<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <!-- user-scalable=no + maximum-scale=1 kills pinch-zoom in Safari -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <!-- Add to home screen: hide browser chrome, run fullscreen -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Bullet Heaven</title>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1a1a2e;
      /* Kill text selection and callout menus on long-press */
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
    }

    #canvas {
      display: block;
      /* Disable all browser touch gestures on the canvas */
      touch-action: none;
      /* Remove tap highlight flash on iOS */
      -webkit-tap-highlight-color: transparent;
    }

    /* Landscape nudge overlay — shown when in portrait on a phone-sized screen */
    #rotate-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: #1a1a2e;
      color: #fff;
      font-family: sans-serif;
      font-size: 1.4rem;
      align-items: center;
      justify-content: center;
      text-align: center;
      z-index: 100;
    }

    @media (orientation: portrait) and (max-width: 900px) {
      #rotate-overlay { display: flex; }
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="rotate-overlay">🔄<br>Rotate to landscape to play</div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
